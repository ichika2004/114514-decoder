<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>惡臭加密器</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js"></script>
</head>
<body>

<div class="box">
    <h2>惡臭編碼器</h2>
    
    <section>
    <h3>🔑 金鑰設定</h3>
    <textarea id="keyInput" placeholder="在此輸入公鑰或私鑰..."></textarea>
    <button onclick="generateTestKeys()">生成測試金鑰並自動複製私鑰</button>
</section>

<hr>

<section>
    <h3>🔒 惡臭加密 (明文 -> 密文)</h3>
    <textarea id="encryptInput" placeholder="輸入要加密的明文..."></textarea>
    <button onclick="doEncrypt()">產生惡臭密文</button>
    <div id="encryptOutput" class="output-box">加密結果將顯示於此...</div>
</section>

<hr>

<section>
    <h3>🔓 惡臭解密 (密文 -> 明文)</h3>
    <textarea id="decryptInput" placeholder="在此貼上要解密的惡臭算式..."></textarea>
    <button onclick="doDecrypt()">還原明文</button>
    <div id="decryptOutput" class="output-box">解密結果將顯示於此...</div>
</section>
</div>

<script src="script.js"></script>
</body>
</html>
