<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>惡臭加密器</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js"></script>
</head>
<body>

<div class="box">
    <h2>惡臭編碼器</h2>
    
   <div>
    <h3>🔒 惡臭加密 (明文 -> 密文)</h3>
    <textarea id="encryptInput" placeholder="輸入要加密的明文..."></textarea>
    <button onclick="doEncrypt()">產生惡臭密文</button>
    
    <div id="encryptOutput" style="border:1px solid #ccc; min-height:50px; padding:10px; word-break:break-all;">
        加密結果將顯示於此...
    </div>
</div>

<hr>

<div>
    <h3>🔓 惡臭解密 (密文 -> 明文)</h3>
    <textarea id="decryptInput" placeholder="貼上惡臭算式進行解密..."></textarea>
    <button onclick="doDecrypt()">還原明文</button>
    
    <div id="decryptOutput" style="border:1px solid #ccc; min-height:50px; padding:10px;">
        解密結果將顯示於此...
    </div>
</div>g
</div>

<script src="script.js"></script>
</body>
</html>
