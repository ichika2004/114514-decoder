<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSA 114514 算式加密器</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js"></script>
</head>
<body>

<div class="box">
    <h2>RSA x 114514 算式編碼器</h2>
    
    <div class="input-section">
        <label>1. RSA 公鑰 (加密) 或 私鑰 (解密)：</label>
        <textarea id="keyInput" placeholder="在此貼上 PEM 格式的金鑰..."></textarea>
        
        <div class="btn-group">
            <button class="secondary-btn" onclick="generateTestKeys()">生成測試金鑰對</button>
        </div>
    </div>

    <div class="input-section">
        <label>2. 輸入明文：</label>
        <textarea id="plainInput" placeholder="例如：Hello NSYSU"></textarea>
    </div>

    <div class="action-section">
        <button class="primary-btn" onclick="doEncrypt()">產生惡臭算式密文 ▼</button>
    </div>
    
    <div class="result-label">密文輸出 (114514 算式)：</div>
    <div class="result-box" id="cipherOutput">等待加密...</div>

    <hr>

    <div class="action-section">
        <button class="primary-btn" onclick="doDecrypt()">從算式還原明文 ▲</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
